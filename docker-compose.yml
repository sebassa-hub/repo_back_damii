version: '3.8'

services:
  # ==========================================
  # Servicio 1: Base de Datos MySQL Autónoma
  # ==========================================
  db:
    image: mysql:8.0
    container_name: damii-mysql
    environment:
      # Credenciales extraídas de tu application.properties
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: rutasperu
    ports:
      - "3306:3306"
    volumes:
      # Volumen persistente: Evita que tus datos se borren si el contenedor se apaga
      - db_data:/var/lib/mysql
    # Sistema inteligente para evitar que tu aplicación intente conectarse antes de que la DB haya despertado
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Servicio 2: Tu Aplicación Spring Boot (Backend)
  # ==========================================
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: damii-springboot
    ports:
      - "8080:8080"
    environment:
      # Sobrescribimos el 'localhost' de tu application.properties en caliente.
      # Usamos 'db' como la IP resolutiva de tu Base de Datos Dockerizada.
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/rutasperu?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      # Obliga a SpringBoot a quedarse en sala de espera hasta que la DB apruebe su 'healthcheck'
      db:
        condition: service_healthy

# Declaración de la memoria secundaria en disco para la BBDD
volumes:
  db_data:
