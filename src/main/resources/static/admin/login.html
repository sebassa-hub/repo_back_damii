<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Administrador</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 to-purple-800 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="glass-panel p-8 sm:p-10 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Admin Dashboard</h1>
            <p class="text-sm text-gray-600 mt-2">Inicia sesión para gestionar Rutas, Usuarios y Ratings</p>
        </div>

        <div id="error-message" class="hidden mb-4 p-4 rounded-lg bg-red-50 text-red-700 text-sm border border-red-200">
            <p id="error-text">Credenciales incorrectas.</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <div class="mt-1 relative">
                    <input id="email" name="email" type="email" required 
                        class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors sm:text-sm"
                        placeholder="admin@gmail.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <div class="mt-1 relative">
                    <input id="password" name="password" type="password" required 
                        class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors sm:text-sm"
                        placeholder="••••••••">
                </div>
            </div>

            <div>
                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                    Entrar al Dashboard
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const btn = document.getElementById('submit-btn');

            btn.disabled = true;
            btn.innerHTML = 'Ingresando...';
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    throw new Error('Credenciales incorrectas o error de servidor');
                }

                const data = await response.json();
                
                if (data.token) {
                    // Guardar en Storage y redirigir
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin/index.html';
                } else {
                    throw new Error('Token no proporcionado');
                }

            } catch (err) {
                errorText.textContent = err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Entrar al Dashboard';
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = '/admin/index.html';
        }
    </script>
</body>
</html>
